<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>كاشير — مستر كيمز</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #367d4d;
      --green-dark: #285f3b;
      --green-pale: #e8f5ee;
      --red: #e53e3e;
      --orange: #d97706;
      --white: #fff;
      --off-white: #f7f9f7;
      --text-dark: #1a1a1a;
      --text-mid: #4a4a4a;
      --text-soft: #888;
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-pill: 9999px;
      --shadow-sm: 0 4px 16px rgba(0,0,0,0.09);
      --shadow-md: 0 8px 32px rgba(0,0,0,0.13);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', sans-serif;
      background: #f0f4f1;
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--green);
      color: #fff;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-sm);
    }
    .header-title { font-size: 1.3rem; font-weight: 900; }
    .header-meta { font-size: 0.85rem; opacity: 0.8; }
    .header-sound {
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.4);
      color: #fff;
      border-radius: var(--radius-pill);
      padding: 8px 18px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .header-sound:hover { background: rgba(255,255,255,0.3); }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 16px;
      padding: 16px 28px;
      background: var(--white);
      border-bottom: 1px solid #e0e8e3;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--off-white);
      border-radius: var(--radius-sm);
      padding: 12px 20px;
      text-align: center;
      min-width: 100px;
    }
    .stat-num { font-size: 1.6rem; font-weight: 900; color: var(--green); }
    .stat-label { font-size: 0.75rem; color: var(--text-soft); margin-top: 2px; }

    /* Filter tabs */
    .filter-bar {
      padding: 16px 28px 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 20px;
      border-radius: var(--radius-pill);
      border: 2px solid #d4e8d8;
      background: var(--white);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-mid);
    }
    .filter-btn:hover { border-color: var(--green); color: var(--green); }
    .filter-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

    /* Orders grid */
    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      padding: 20px 28px;
    }

    /* Order card */
    .order-card {
      background: var(--white);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      border-right: 5px solid var(--green);
      transition: box-shadow 0.2s;
      animation: slideIn 0.4s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .order-card.status-new    { border-right-color: var(--orange); }
    .order-card.status-making { border-right-color: var(--green); }
    .order-card.status-done   { border-right-color: #aaa; opacity: 0.6; }

    .order-card-header {
      padding: 14px 18px;
      background: var(--off-white);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
    }
    .order-num { font-weight: 900; font-size: 1.1rem; }
    .order-type-badge {
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      font-size: 0.75rem;
      font-weight: 800;
    }
    .badge-dine    { background: #dbeafe; color: #1d4ed8; }
    .badge-pickup  { background: #fef9c3; color: #854d0e; }
    .order-time   { font-size: 0.78rem; color: var(--text-soft); }

    .order-info {
      padding: 12px 18px;
      font-size: 0.85rem;
      color: var(--text-mid);
      border-bottom: 1px solid #f5f5f5;
    }
    .order-info strong { color: var(--text-dark); }

    .order-items { padding: 12px 18px; }
    .order-item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      font-size: 0.9rem;
      border-bottom: 1px dashed #f0f0f0;
    }
    .order-item-row:last-child { border: none; }
    .item-name { font-weight: 700; }
    .item-qty  { color: var(--green); font-weight: 900; }

    .order-total-row {
      padding: 10px 18px;
      background: var(--green-pale);
      display: flex;
      justify-content: space-between;
      font-weight: 900;
      font-size: 0.95rem;
    }
    .order-total-amount { color: var(--green); }

    .order-actions {
      padding: 14px 18px;
      display: flex;
      gap: 10px;
    }
    .btn-action {
      flex: 1;
      padding: 10px;
      border-radius: var(--radius-pill);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-making {
      background: var(--green);
      color: #fff;
    }
    .btn-making:hover { background: var(--green-dark); }
    .btn-done {
      background: #e2e8f0;
      color: var(--text-mid);
    }
    .btn-done:hover { background: #cbd5e0; }
    .btn-print {
      background: none;
      border: 2px solid #d4e8d8 !important;
      color: var(--green);
      flex: 0 0 auto;
      padding: 10px 14px;
    }
    .btn-print:hover { background: var(--green-pale); }
    .btn-cancel {
      background: none;
      border: 2px solid #fed7d7 !important;
      color: var(--red);
      flex: 0 0 auto;
      padding: 10px 14px;
      border-radius: var(--radius-pill);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancel:hover { background: #fff0f0; }
    .order-card.status-cancelled { border-right-color: #ccc; opacity: 0.5; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-soft);
      grid-column: 1/-1;
    }
    .empty-icon { font-size: 4rem; margin-bottom: 16px; }

    /* New order notification overlay */
    .new-order-flash {
      position: fixed;
      top: 80px; left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--orange);
      color: #fff;
      padding: 14px 32px;
      border-radius: var(--radius-pill);
      font-weight: 900;
      font-size: 1rem;
      z-index: 999;
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
      box-shadow: var(--shadow-md);
    }
    .new-order-flash.show { transform: translateX(-50%) translateY(0); }

    /* ─── Tabs ─── */
    .page-tabs {
      display: flex;
      gap: 4px;
      padding: 16px 28px 0;
      border-bottom: 2px solid #e0e8e3;
      background: var(--white);
    }
    .page-tab {
      padding: 10px 24px;
      border-radius: 10px 10px 0 0;
      border: 2px solid transparent;
      border-bottom: none;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 800;
      cursor: pointer;
      background: var(--off-white);
      color: var(--text-mid);
      transition: all 0.2s;
      position: relative;
      bottom: -2px;
    }
    .page-tab:hover { color: var(--green); background: var(--green-pale); }
    .page-tab.active {
      background: var(--white);
      color: var(--green);
      border-color: #e0e8e3;
      border-bottom-color: var(--white);
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ─── History section ─── */
    .history-bar {
      display: flex;
      gap: 12px;
      padding: 20px 28px 12px;
      align-items: center;
      flex-wrap: wrap;
      background: var(--white);
      border-bottom: 1px solid #e0e8e3;
    }
    .history-bar label { font-size: 0.85rem; font-weight: 700; color: var(--text-mid); }
    .history-bar input[type="date"] {
      padding: 8px 14px;
      border: 2px solid #d4e8d8;
      border-radius: var(--radius-pill);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-dark);
      background: var(--white);
      cursor: pointer;
      direction: ltr;
    }
    .history-bar input[type="date"]:focus { outline: none; border-color: var(--green); }
    .btn-history-load {
      padding: 8px 22px;
      border-radius: var(--radius-pill);
      background: var(--green);
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-history-load:hover { background: var(--green-dark); }

    .history-summary {
      display: flex;
      gap: 14px;
      padding: 12px 28px;
      flex-wrap: wrap;
    }
    .history-stat {
      background: var(--off-white);
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-size: 0.8rem;
      color: var(--text-mid);
    }
    .history-stat strong { display: block; font-size: 1.2rem; font-weight: 900; color: var(--green); }

    .history-list {
      padding: 0 28px 28px;
    }
    .history-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      font-size: 0.88rem;
    }
    .history-table th {
      background: var(--green);
      color: #fff;
      padding: 12px 16px;
      font-weight: 800;
      text-align: right;
    }
    .history-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }
    .history-table tr:last-child td { border-bottom: none; }
    .history-table tr:hover td { background: var(--green-pale); }
    .status-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: var(--radius-pill);
      font-size: 0.75rem;
      font-weight: 800;
    }
    .status-badge.new      { background: #fff3e0; color: #e65100; }
    .status-badge.making   { background: var(--green-pale); color: var(--green); }
    .status-badge.done     { background: #e8f5e9; color: #2e7d32; }
    .status-badge.cancelled{ background: #fce4ec; color: #c62828; }
    .history-items-list { font-size: 0.82rem; color: var(--text-mid); line-height: 1.6; }
    .history-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-soft);
      font-size: 0.9rem;
    }

    /* SSE 연결 상태 표시 */
    .conn-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #aaa;
      margin-left: 6px;
      vertical-align: middle;
      transition: background 0.3s;
    }
    .conn-dot.online  { background: #4caf50; animation: blink 2s ease infinite; }
    .conn-dot.offline { background: #e53e3e; }
    @keyframes blink {
      0%,100% { opacity:1; } 50% { opacity:0.4; }
    }


    /* Print receipt styles */
    @media print {
      body > *:not(#print-area) { display: none !important; }
      #print-area {
        display: block !important;
        font-family: monospace;
        font-size: 12px;
        width: 80mm;
        margin: 0 auto;
      }
    }
    #print-area { display: none; }
  </style>
</head>
<body>

<div id="print-area"></div>
<div class="new-order-flash" id="new-flash">🔔 طلب جديد!</div>

<!-- Header -->
<div class="header">
  <div>
    <div class="header-title">🏪 كاشير — مستر كيمز</div>
    <div class="header-meta" id="header-time"></div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <span style="font-size:0.78rem;opacity:0.8;">مباشر<span class="conn-dot" id="conn-dot"></span></span>
    <button class="header-sound" onclick="toggleSound()" id="sound-btn">🔔 الصوت: تشغيل</button>
  </div>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-num" id="stat-new">0</div>
    <div class="stat-label">جديد</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="stat-making">0</div>
    <div class="stat-label">قيد التحضير</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="stat-done">0</div>
    <div class="stat-label">مكتمل اليوم</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="stat-total">0</div>
    <div class="stat-label">إجمالي اليوم (IQD)</div>
  </div>
</div>

<!-- Tabs -->
<div class="page-tabs">
  <button class="page-tab active" id="tab-orders"  onclick="switchTab('orders')">📋 الطلبات الحالية</button>
  <button class="page-tab"        id="tab-history" onclick="switchTab('history')">🗂️ سجل الطلبات</button>
  <button class="page-tab"        id="tab-qr"      onclick="switchTab('qr')">🪑 QR الطاولات</button>
</div>

<!-- ── Tab: Current Orders ── -->
<div class="tab-pane active" id="pane-orders">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">الكل</button>
    <button class="filter-btn" onclick="setFilter('new',this)">🟠 جديد</button>
    <button class="filter-btn" onclick="setFilter('making',this)">🟢 قيد التحضير</button>
    <button class="filter-btn" onclick="setFilter('done',this)">✅ مكتمل</button>
  </div>
  <div class="orders-grid" id="orders-grid"></div>
</div>

<!-- ── Tab: Order History ── -->
<div class="tab-pane" id="pane-history">
  <div class="history-bar">
    <label>📅 التاريخ:</label>
    <input type="date" id="history-date" />
    <button class="btn-history-load" onclick="loadHistory()">عرض</button>
  </div>
  <div class="history-summary" id="history-summary"></div>
  <div class="history-list" id="history-list">
    <div class="history-empty">اختر تاريخاً لعرض سجل الطلبات</div>
  </div>
</div>


<!-- ── Tab: Table QR Codes ── -->
<div class="tab-pane" id="pane-qr">
  <div style="padding:24px 28px">
    <!-- 생성 폼 -->
    <div style="background:#fff;border-radius:16px;padding:20px 24px;box-shadow:0 2px 12px rgba(0,0,0,0.07);margin-bottom:24px;display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
      <div>
        <div style="font-size:0.8rem;color:#888;margin-bottom:6px;font-weight:700">رقم الطاولة / Table No.</div>
        <input type="number" id="qr-table-input" min="1" max="99" placeholder="e.g. 5"
          style="width:120px;padding:10px 14px;border:2px solid #d4e8d8;border-radius:10px;font-size:1rem;font-family:inherit;outline:none" />
      </div>
      <button onclick="generateTableQR()"
        style="background:#367d4d;color:#fff;border:none;border-radius:10px;padding:11px 22px;font-size:0.95rem;font-weight:800;cursor:pointer;font-family:inherit">
        ➕ إنشاء QR / Generate QR
      </button>
    </div>
    <!-- 목록 -->
    <div id="qr-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
  /* ─── State ─── */
  let orders = [];
  let soundOn = true;
  let currentFilter = 'all';
  let currentTab = 'orders';

  /* ─── XSS 방지 ─── */
  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  /* ─── Baghdad(UTC+3) 기준 오늘 날짜 ─── */
  function localDateStr() {
    const now = new Date();
    const local = new Date(now.getTime() + 3 * 60 * 60 * 1000);
    return local.toISOString().slice(0, 10);
  }

  /* ─── Clock ─── */
  function updateClock() {
    const now = new Date();
    document.getElementById('header-time').textContent =
      now.toLocaleDateString('ar-IQ') + '  ' + now.toLocaleTimeString('ar-IQ');
  }
  setInterval(updateClock, 1000);
  updateClock();

  /* ─── Tab switching ─── */
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.page-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('pane-' + tab).classList.add('active');
    if (tab === 'history') {
      const dateInput = document.getElementById('history-date');
      if (!dateInput.value) dateInput.value = localDateStr();
      loadHistory();
    }
    if (tab === 'qr') loadTableQRs();
  }

  /* ─── Sound ─── */
  function playSound() {
    if (!soundOn) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [880, 1100, 880].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.18);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.3);
        osc.start(ctx.currentTime + i * 0.18);
        osc.stop(ctx.currentTime + i * 0.18 + 0.3);
      });
    } catch (_) {}
  }

  function toggleSound() {
    soundOn = !soundOn;
    document.getElementById('sound-btn').textContent = soundOn ? '🔔 الصوت: تشغيل' : '🔕 الصوت: إيقاف';
  }

  /* ─── Stats ─── */
  function updateStats() {
    document.getElementById('stat-new').textContent    = orders.filter(o => o.status === 'new').length;
    document.getElementById('stat-making').textContent = orders.filter(o => o.status === 'making').length;
    document.getElementById('stat-done').textContent   = orders.filter(o => o.status === 'done').length;
    const totalRevenue = orders.filter(o => o.status === 'done').reduce((s,o) => s + o.total, 0);
    document.getElementById('stat-total').textContent  = totalRevenue.toLocaleString();
  }

  /* ─── Render current orders ─── */
  function renderOrders() {
    const grid = document.getElementById('orders-grid');
    const filtered = currentFilter === 'all' ? orders : orders.filter(o => o.status === currentFilter);
    const sorted = [...filtered].sort((a,b) => b.timestamp - a.timestamp);

    if (sorted.length === 0) {
      grid.innerHTML = `<div class="empty-state">
        <div class="empty-icon">☕</div>
        <div>لا توجد طلبات حالياً</div>
      </div>`;
      updateStats();
      return;
    }

    grid.innerHTML = sorted.map(order => {
      const time = new Date(order.timestamp).toLocaleTimeString('ar-IQ', {hour:'2-digit', minute:'2-digit'});
      const typeBadge = order.type === 'dine'
        ? `<span class="order-type-badge badge-dine">🪑 طاولة ${esc(order.table_num)}</span>`
        : `<span class="order-type-badge badge-pickup">🏃 استلام</span>`;
      const arrivalBadge = order.arrival_time
        ? `&nbsp; ⏱ ${esc(order.arrival_time)}`
        : '';
      const info = order.type === 'pickup'
        ? `<div class="order-info">👤 <strong>${esc(order.customer_name)}</strong> &nbsp; 📞 ${esc(order.customer_phone)}${arrivalBadge}</div>`
        : '';
      const itemsHtml = order.items.map(i =>
        `<div class="order-item-row"><span>${esc(i.emoji)} <span class="item-name">${esc(i.nameAr || i.name)}</span></span><span class="item-qty">×${esc(String(i.qty))}</span></div>`
      ).join('');

      const safeId = esc(order.id);
      const actionBtns = order.status === 'new'
        ? `<button class="btn-action btn-making" id="btn-${safeId}" onclick="setStatus('${safeId}','making')">✓ بدء التحضير</button>`
        : order.status === 'making'
        ? `<button class="btn-action btn-done" id="btn-${safeId}" onclick="setStatus('${safeId}','done')">✅ تم التسليم</button>`
        : order.status === 'cancelled'
        ? `<span style="color:#e53e3e;font-size:0.85rem;font-weight:700;">❌ ملغي</span>`
        : `<span style="color:#aaa;font-size:0.85rem;font-weight:700;">✅ مكتمل</span>`;

      const cancelBtn = (order.status === 'new' || order.status === 'making')
        ? `<button class="btn-cancel" id="cancel-${safeId}" onclick="cancelOrder('${safeId}')" title="إلغاء الطلب">✕</button>`
        : '';

      return `<div class="order-card status-${order.status}" id="card-${safeId}">
        <div class="order-card-header">
          <span class="order-num">#${order.num}</span>
          <div style="display:flex;gap:8px;align-items:center;">
            ${typeBadge}
            <span class="order-time">${time}</span>
          </div>
        </div>
        ${info}
        <div class="order-items">${itemsHtml}</div>
        <div class="order-total-row">
          <span>الإجمالي</span>
          <span class="order-total-amount">${order.total.toLocaleString()} IQD</span>
        </div>
        <div class="order-actions">
          ${actionBtns}
          <button class="btn-action btn-print" onclick="printReceipt('${safeId}')" title="طباعة">🖨️</button>
          ${cancelBtn}
        </div>
      </div>`;
    }).join('');

    updateStats();
  }

  /* ─── API: 주문 취소 ─── */
  async function cancelOrder(id) {
    if (!confirm('هل تريد إلغاء هذا الطلب؟')) return;
    const btn = document.getElementById(`cancel-${id}`);
    if (btn) { btn.disabled = true; btn.textContent = '...'; }
    try {
      const res = await fetch(`/api/orders/${id}/status`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'cancelled' })
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      const idx = orders.findIndex(o => o.id === id);
      if (idx !== -1) { orders[idx] = data.order; renderOrders(); }
    } catch (e) {
      alert('فشل الإلغاء. حاول مرة أخرى.');
      if (btn) { btn.disabled = false; btn.textContent = '✕'; }
    }
  }

  /* ─── API: 주문 상태 변경 ─── */
  async function setStatus(id, status) {
    const btn = document.getElementById(`btn-${id}`);
    if (btn) { btn.disabled = true; }
    try {
      const res = await fetch(`/api/orders/${id}/status`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      const idx = orders.findIndex(o => o.id === id);
      if (idx !== -1) { orders[idx] = data.order; renderOrders(); }
    } catch (e) {
      alert('فشل تغيير الحالة. حاول مرة أخرى.');
      if (btn) { btn.disabled = false; }
    }
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
  }

  /* ─── New order notification ─── */
  function showNewOrderFlash() {
    playSound();
    const flash = document.getElementById('new-flash');
    flash.classList.add('show');
    setTimeout(() => flash.classList.remove('show'), 3000);
  }

  /* ─── Print receipt ─── */
  function printReceipt(id) {
    const allOrders = [...orders, ...(window._historyOrders || [])];
    const o = allOrders.find(x => x.id === id);
    if (!o) return;
    const time = new Date(o.timestamp).toLocaleString('ar-IQ');
    const typeStr = o.type === 'dine'
      ? `داخل المحل — طاولة ${esc(o.table_num)}`
      : `استلام — ${esc(o.customer_name)}`;
    let html = `<div style="text-align:center;font-weight:bold;font-size:16px;">مستر كيمز</div>
<div style="text-align:center;font-size:12px;">Mr. Kim&#39;s CAFE</div>
<div style="border-top:1px dashed #000;margin:8px 0;"></div>
<div>رقم الطلب: #${esc(String(o.num))}</div>
<div>الوقت: ${esc(time)}</div>
<div>النوع: ${typeStr}</div>
<div style="border-top:1px dashed #000;margin:8px 0;"></div>`;
    o.items.forEach(i => {
      html += `<div style="display:flex;justify-content:space-between;"><span>${esc(i.emoji)} ${esc(i.nameAr || i.name)} ×${esc(String(i.qty))}</span><span>${(i.price*i.qty).toLocaleString()} IQD</span></div>`;
    });
    html += `<div style="border-top:1px dashed #000;margin:8px 0;"></div>
<div style="display:flex;justify-content:space-between;font-weight:bold;"><span>الإجمالي</span><span>${o.total.toLocaleString()} IQD</span></div>
<div style="text-align:center;margin-top:12px;font-size:11px;">شكراً لزيارتكم!</div>`;
    document.getElementById('print-area').innerHTML = html;
    window.print();
  }

  /* ─── API: 오늘 주문 불러오기 (+ 폴백 폴링) ─── */
  async function loadOrders() {
    const today = localDateStr();
    try {
      const res = await fetch(`/api/orders?date=${today}`);
      if (!res.ok) throw new Error();
      orders = await res.json();
      renderOrders();
    } catch (e) {
      console.warn('주문 로드 실패, 재시도 예정');
    }
  }

  /* ─── History tab ─── */
  window._historyOrders = [];

  async function loadHistory() {
    const date = document.getElementById('history-date').value;
    if (!date) return;
    const summaryEl = document.getElementById('history-summary');
    const listEl = document.getElementById('history-list');
    listEl.innerHTML = `<div class="history-empty">جارٍ التحميل…</div>`;
    summaryEl.innerHTML = '';
    try {
      const res = await fetch(`/api/orders?date=${date}`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      window._historyOrders = data;

      // Summary stats
      const total = data.reduce((s,o) => s + o.total, 0);
      const done  = data.filter(o => o.status === 'done').length;
      const rev   = data.filter(o => o.status === 'done').reduce((s,o) => s + o.total, 0);
      summaryEl.innerHTML = `
        <div class="history-stat"><strong>${data.length}</strong>إجمالي الطلبات</div>
        <div class="history-stat"><strong>${done}</strong>مكتمل</div>
        <div class="history-stat"><strong>${data.filter(o=>o.status==='cancelled').length}</strong>ملغي</div>
        <div class="history-stat"><strong>${rev.toLocaleString()} IQD</strong>الإيرادات المؤكدة</div>
      `;

      if (data.length === 0) {
        listEl.innerHTML = `<div class="history-empty">لا توجد طلبات في هذا التاريخ</div>`;
        return;
      }

      const statusLabel = { new:'جديد', making:'قيد التحضير', done:'مكتمل', cancelled:'ملغي' };
      const rows = [...data].sort((a,b) => b.timestamp - a.timestamp).map(o => {
        const time = new Date(o.timestamp).toLocaleTimeString('ar-IQ', {hour:'2-digit', minute:'2-digit'});
        const typeStr = o.type === 'dine' ? `🪑 طاولة ${esc(o.table_num)}` : `🏃 ${esc(o.customer_name||'')}`;
        const itemsList = o.items.map(i => `${esc(i.emoji)} ${esc(i.nameAr||i.name)} ×${i.qty}`).join('<br>');
        return `<tr>
          <td style="font-weight:900;">#${o.num}</td>
          <td>${time}</td>
          <td>${typeStr}</td>
          <td><div class="history-items-list">${itemsList}</div></td>
          <td style="font-weight:900;color:var(--green);">${o.total.toLocaleString()}</td>
          <td><span class="status-badge ${o.status}">${statusLabel[o.status]||o.status}</span></td>
          <td><button class="btn-action btn-print" style="padding:6px 10px;" onclick="printReceipt('${esc(o.id)}')" title="طباعة">🖨️</button></td>
        </tr>`;
      }).join('');

      listEl.innerHTML = `<table class="history-table">
        <thead><tr>
          <th>رقم</th><th>الوقت</th><th>النوع</th><th>الطلبات</th><th>IQD</th><th>الحالة</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    } catch (e) {
      listEl.innerHTML = `<div class="history-empty">فشل تحميل البيانات</div>`;
    }
  }

  /* ─── SSE: 실시간 새 주문 수신 ─── */
  function setConnDot(state) {
    const dot = document.getElementById('conn-dot');
    if (!dot) return;
    dot.className = 'conn-dot ' + state;
  }

  function connectSSE() {
    const es = new EventSource('/api/orders/stream');
    es.onopen = () => setConnDot('online');
    es.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'connected') { setConnDot('online'); return; }
      if (msg.type === 'new_order') {
        const todayStr = localDateStr();
        const orderDate = new Date(msg.order.timestamp + 3*3600*1000).toISOString().slice(0,10);
        if (!orders.find(o => o.id === msg.order.id)) {
          if (orderDate === todayStr) orders.unshift(msg.order);
        }
        renderOrders();
        showNewOrderFlash();
      } else if (msg.type === 'order_updated') {
        const idx = orders.findIndex(o => o.id === msg.order.id);
        if (idx !== -1) { orders[idx] = msg.order; renderOrders(); }
      }
    };
    es.onerror = () => {
      setConnDot('offline');
      es.close();
      setTimeout(connectSSE, 4000);
    };
  }

  /* ─── Admin Token ─── */
  let adminToken = localStorage.getItem('kims-admin-token') || '';

  /* ─── Table QR Codes ─── */
  const BASE_URL = location.origin;

  async function loadTableQRs() {
    const list = document.getElementById('qr-list');
    list.innerHTML = '<div style="color:#888;padding:20px">جاري التحميل...</div>';
    try {
      const r = await fetch('/api/table-tokens', { headers: { 'x-auth-token': adminToken } });
      if (r.status === 401) { list.innerHTML = '<div style="color:#e53e3e;padding:20px">⚠️ يجب تسجيل الدخول أولاً</div>'; return; }
      const tokens = await r.json();
      if (!tokens.length) { list.innerHTML = '<div style="color:#888;padding:20px">لا توجد طاولات. أنشئ QR أولاً.</div>'; return; }
      list.innerHTML = '';
      for (const t of tokens) {
        const url = `${BASE_URL}/?table=${t.table_num}&t=${t.token}`;
        const card = document.createElement('div');
        card.style.cssText = 'background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.08);text-align:center';
        card.innerHTML = `
          <div style="font-weight:900;font-size:1.1rem;margin-bottom:12px">🪑 طاولة ${t.table_num} / Table ${t.table_num}</div>
          <canvas id="qr-canvas-${t.table_num}" style="border-radius:8px"></canvas>
          <div style="margin-top:12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
            <button onclick="printTableQR('${t.table_num}','${url}')"
              style="background:#367d4d;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:0.85rem;font-weight:800;cursor:pointer;font-family:inherit">
              🖨️ طباعة / Print
            </button>
            <button onclick="regenToken('${t.table_num}')"
              style="background:#f0f4f1;color:#4a4a4a;border:1px solid #d4e8d8;border-radius:8px;padding:8px 16px;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:inherit">
              🔄 تجديد
            </button>
            <button onclick="deleteTableToken('${t.table_num}')"
              style="background:#fff5f5;color:#e53e3e;border:1px solid #fecaca;border-radius:8px;padding:8px 16px;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:inherit">
              🗑️
            </button>
          </div>`;
        list.appendChild(card);
        QRCode.toCanvas(document.getElementById(`qr-canvas-${t.table_num}`), url, { width: 180, margin: 1 });
      }
    } catch(e) {
      list.innerHTML = '<div style="color:#e53e3e;padding:20px">خطأ في التحميل</div>';
    }
  }

  async function generateTableQR() {
    const tableNum = document.getElementById('qr-table-input').value.trim();
    if (!tableNum) { alert('أدخل رقم الطاولة / Enter table number'); return; }
    const r = await fetch('/api/table-tokens', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-auth-token': adminToken },
      body: JSON.stringify({ tableNum })
    });
    if (r.status === 401) { alert('يجب تسجيل الدخول أولاً / Please login first'); return; }
    if (r.ok) { document.getElementById('qr-table-input').value = ''; loadTableQRs(); }
  }

  async function regenToken(tableNum) {
    if (!confirm(`تجديد رمز الطاولة ${tableNum}؟\nRegenerate token for Table ${tableNum}?\n\n⚠️ The old QR code will stop working!`)) return;
    await fetch('/api/table-tokens', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-auth-token': adminToken },
      body: JSON.stringify({ tableNum })
    });
    loadTableQRs();
  }

  async function deleteTableToken(tableNum) {
    if (!confirm(`حذف QR الطاولة ${tableNum}؟\nDelete QR for Table ${tableNum}?`)) return;
    await fetch(`/api/table-tokens/${tableNum}`, {
      method: 'DELETE', headers: { 'x-auth-token': adminToken }
    });
    loadTableQRs();
  }

  function printTableQR(tableNum, url) {
    const win = window.open('', '_blank');
    win.document.write(`
      <!DOCTYPE html><html><head>
      <meta charset="UTF-8">
      <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 40px; }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        p { color: #555; margin-bottom: 20px; font-size: 1rem; }
        canvas { display: block; margin: 0 auto; }
        @media print { button { display: none; } }
      </style></head><body>
      <h1>🪑 Mr. Kim's Cafe</h1>
      <p>Table ${tableNum} — Scan to order / امسح للطلب</p>
      <canvas id="print-qr"></canvas>
      <br><button onclick="window.print()">🖨️ Print</button>
      <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"><\/script>
      <script>QRCode.toCanvas(document.getElementById('print-qr'), '${url}', { width: 300, margin: 2 });<\/script>
      </body></html>`);
    win.document.close();
  }

  /* ─── 폴백 폴링: 30초마다 오늘 주문 재동기화 ─── */
  setInterval(loadOrders, 30000);

  /* ─── Init ─── */
  document.getElementById('history-date').value = localDateStr();
  loadOrders();
  connectSSE();
</script>

</body>
</html>
